<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Latihan Soal SAS Matematika Kelas X</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f4f6fb;
    --card: #ffffff;
    --primary: #3b6ef8;
    --primary-light: #eef2ff;
    --correct: #16a34a;
    --correct-bg: #f0fdf4;
    --wrong: #dc2626;
    --wrong-bg: #fef2f2;
    --neutral: #64748b;
    --border: #e2e8f0;
    --text: #1e293b;
    --subtext: #64748b;
    --shadow: 0 2px 12px rgba(59,110,248,0.08);
    --radius: 14px;
  }

  body {
    font-family: 'Poppins', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 0;
  }

  /* HEADER */
  .header {
    background: linear-gradient(135deg, #3b6ef8 0%, #6c3fc5 100%);
    color: white;
    padding: 28px 20px 22px;
    text-align: center;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 4px 20px rgba(59,110,248,0.3);
  }
  .header h1 { font-size: 1.1rem; font-weight: 700; letter-spacing: 0.02em; }
  .header p { font-size: 0.75rem; opacity: 0.85; margin-top: 3px; }
  .progress-bar-wrap { background: rgba(255,255,255,0.2); border-radius: 99px; height: 7px; margin-top: 14px; overflow: hidden; }
  .progress-bar-fill { height: 100%; background: #fff; border-radius: 99px; transition: width 0.5s ease; }
  .progress-label { font-size: 0.7rem; opacity: 0.8; margin-top: 5px; }

  /* SCORE PANEL */
  .score-panel {
    display: flex;
    justify-content: center;
    gap: 14px;
    padding: 14px 16px;
    background: white;
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 98px;
    z-index: 99;
  }
  .score-item {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 0.78rem;
    font-weight: 600;
  }
  .score-dot { width: 10px; height: 10px; border-radius: 50%; }
  .dot-correct { background: var(--correct); }
  .dot-wrong { background: var(--wrong); }
  .dot-unanswered { background: #d1d5db; }

  /* MAIN */
  main { padding: 16px; max-width: 680px; margin: 0 auto; }

  /* QUESTION CARD */
  .q-card {
    background: var(--card);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    margin-bottom: 20px;
    overflow: hidden;
    border: 1.5px solid var(--border);
    transition: border-color 0.3s;
  }
  .q-card.answered-correct { border-color: var(--correct); }
  .q-card.answered-wrong { border-color: var(--wrong); }

  .q-header {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 16px 16px 12px;
    border-bottom: 1px solid var(--border);
  }
  .q-number {
    background: var(--primary);
    color: white;
    font-size: 0.7rem;
    font-weight: 700;
    width: 28px;
    height: 28px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    margin-top: 1px;
  }
  .q-text {
    font-size: 0.88rem;
    font-weight: 500;
    line-height: 1.6;
    flex: 1;
  }
  .q-text .math-line {
    display: block;
    font-style: italic;
    color: var(--primary);
    font-size: 0.83rem;
    margin-top: 3px;
  }

  /* OPTIONS */
  .q-options { padding: 12px 14px 14px; display: flex; flex-direction: column; gap: 8px; }

  .option-btn {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 11px 13px;
    border-radius: 10px;
    border: 1.5px solid var(--border);
    background: #f8fafc;
    cursor: pointer;
    font-family: 'Poppins', sans-serif;
    font-size: 0.82rem;
    text-align: left;
    transition: all 0.18s;
    line-height: 1.5;
    -webkit-tap-highlight-color: transparent;
  }
  .option-btn:hover:not(:disabled) {
    border-color: var(--primary);
    background: var(--primary-light);
  }
  .option-label {
    font-weight: 700;
    color: var(--primary);
    min-width: 18px;
  }
  .option-btn:disabled { cursor: default; }
  .option-btn.correct {
    background: var(--correct-bg);
    border-color: var(--correct);
    color: var(--correct);
  }
  .option-btn.correct .option-label { color: var(--correct); }
  .option-btn.wrong {
    background: var(--wrong-bg);
    border-color: var(--wrong);
    color: var(--wrong);
  }
  .option-btn.wrong .option-label { color: var(--wrong); }
  .option-btn.reveal-correct {
    background: var(--correct-bg);
    border-color: var(--correct);
    color: var(--correct);
    opacity: 0.75;
  }

  /* ICON */
  .icon { margin-left: auto; font-size: 1rem; flex-shrink: 0; }

  /* EXPLANATION */
  .explanation {
    margin: 0 14px 14px;
    background: #f8fafc;
    border-radius: 10px;
    border-left: 4px solid var(--primary);
    padding: 12px 13px;
    font-size: 0.78rem;
    line-height: 1.7;
    color: #334155;
    display: none;
  }
  .explanation.show { display: block; animation: fadeSlide 0.3s ease; }
  .explanation strong { color: var(--primary); }
  .explanation .expl-title {
    font-weight: 700;
    font-size: 0.8rem;
    color: var(--primary);
    margin-bottom: 6px;
    display: flex;
    align-items: center;
    gap: 5px;
  }

  /* RESULT BADGE */
  .result-badge {
    display: none;
    align-items: center;
    gap: 6px;
    margin: 0 14px 6px;
    font-size: 0.8rem;
    font-weight: 600;
    padding: 7px 12px;
    border-radius: 8px;
  }
  .result-badge.show { display: flex; }
  .result-badge.correct-badge { background: var(--correct-bg); color: var(--correct); }
  .result-badge.wrong-badge { background: var(--wrong-bg); color: var(--wrong); }

  /* SUMMARY */
  .summary {
    display: none;
    background: white;
    border-radius: var(--radius);
    padding: 24px 20px;
    text-align: center;
    box-shadow: var(--shadow);
    margin-bottom: 30px;
    border: 1.5px solid var(--border);
  }
  .summary.show { display: block; }
  .summary h2 { font-size: 1.2rem; font-weight: 700; color: var(--text); }
  .summary .big-score { font-size: 3rem; font-weight: 700; color: var(--primary); margin: 8px 0; }
  .summary p { font-size: 0.85rem; color: var(--subtext); }
  .summary-stats { display: flex; justify-content: center; gap: 20px; margin-top: 14px; }
  .stat { text-align: center; }
  .stat .val { font-size: 1.4rem; font-weight: 700; }
  .stat .lbl { font-size: 0.7rem; color: var(--subtext); }
  .retry-btn {
    margin-top: 18px;
    background: var(--primary);
    color: white;
    border: none;
    border-radius: 10px;
    padding: 12px 28px;
    font-family: 'Poppins', sans-serif;
    font-size: 0.88rem;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s;
  }
  .retry-btn:hover { background: #2554d4; }

  @keyframes fadeSlide {
    from { opacity: 0; transform: translateY(-6px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* Responsive */
  @media (max-width: 480px) {
    .header h1 { font-size: 0.95rem; }
    .q-text { font-size: 0.83rem; }
    .option-btn { font-size: 0.79rem; padding: 10px 11px; }
    .score-panel { top: 90px; }
  }
</style>
</head>
<body>

<div class="header">
  <h1>📐 Latihan Soal SAS Matematika Kelas X</h1>
  <p>Pilih jawaban yang benar, lalu lihat penjelasannya!</p>
  <div class="progress-bar-wrap">
    <div class="progress-bar-fill" id="progressBar" style="width:0%"></div>
  </div>
  <div class="progress-label" id="progressLabel">0 dari 30 soal dijawab</div>
</div>

<div class="score-panel">
  <div class="score-item"><span class="score-dot dot-correct"></span><span id="scoreCorrect">0</span> Benar</div>
  <div class="score-item"><span class="score-dot dot-wrong"></span><span id="scoreWrong">0</span> Salah</div>
  <div class="score-item"><span class="score-dot dot-unanswered"></span><span id="scoreLeft">30</span> Belum dijawab</div>
</div>

<main id="quizContainer"></main>

<script>
const questions = [
  {
    no: 1,
    soal: "Tentukan rumus suku ke-n dari barisan aritmetika:\n2, 5, 8, 11, 14, …",
    options: [
      "Uₙ = 3n + 1",
      "Uₙ = 3n − 1",
      "Uₙ = 2n + 1",
      "Uₙ = n + 2"
    ],
    answer: 1,
    explanation: `<strong>Diketahui:</strong> a = 2, b (beda) = 5 − 2 = 3.<br>
<strong>Rumus:</strong> Uₙ = a + (n−1)b = 2 + (n−1)·3 = 2 + 3n − 3 = <strong>3n − 1</strong>.<br>
<strong>Verifikasi:</strong> U₁ = 3(1)−1 = 2 ✓, U₂ = 3(2)−1 = 5 ✓, U₃ = 3(3)−1 = 8 ✓.<br>
<em>A salah</em>: 3n+1 → U₁=4 ≠ 2. <em>C salah</em>: 2n+1 → U₂=5, U₃=7 ≠ 8. <em>D salah</em>: n+2 → U₃=5 ≠ 8.`
  },
  {
    no: 2,
    soal: "Diketahui barisan aritmetika: 5, 2, −1, −4, −7, …\nBerapakah suku ke-12 barisan tersebut?",
    options: [
      "−25",
      "−28",
      "−31",
      "−34"
    ],
    answer: 1,
    explanation: `<strong>Diketahui:</strong> a = 5, b = 2 − 5 = −3.<br>
<strong>Rumus:</strong> Uₙ = a + (n−1)·b.<br>
U₁₂ = 5 + (12−1)·(−3) = 5 + 11·(−3) = 5 − 33 = <strong>−28</strong> ✓.<br>
<em>A salah</em>: −25 → 5+(n−1)(−3)=−25 → n=11, jadi itu U₁₁ bukan U₁₂.<br>
<em>C salah</em>: −31 = U₁₃ karena 5+12·(−3) = 5−36 = −31.<br>
<em>D salah</em>: −34 = U₁₄ karena 5+13·(−3) = 5−39 = −34.`
  },
  {
    no: 3,
    soal: "Diketahui suku ke-4 dan suku ke-8 dari suatu barisan aritmetika adalah 20 dan 8.\nSuku ke-2 barisan tersebut adalah …",
    options: [
      "30",
      "28",
      "26",
      "24"
    ],
    answer: 2,
    explanation: `<strong>Diketahui:</strong> U₄ = 20, U₈ = 8.<br>
U₈ − U₄ = 4b → 8 − 20 = 4b → b = −3.<br>
U₄ = a + 3b → 20 = a + 3(−3) → a = 29.<br>
U₂ = a + b = 29 + (−3) = <strong>26</strong>.<br>
<em>A salah</em>: 30 ≠ U₂. <em>B salah</em>: 28 ≠ U₂. <em>D salah</em>: 24 = U₃ (bukan U₂).`
  },
  {
    no: 4,
    soal: "Dari suatu deret aritmetika, diketahui suku pertama adalah 10 dan suku kelima adalah 30.\nJumlah delapan suku pertama dari deret tersebut adalah …",
    options: [
      "200",
      "220",
      "240",
      "260"
    ],
    answer: 1,
    explanation: `<strong>Diketahui:</strong> a = 10, U₅ = 30.<br>
U₅ = a + 4b → 30 = 10 + 4b → b = 5.<br>
Sₙ = n/2 · (2a + (n−1)b).<br>
S₈ = 8/2 · (2·10 + 7·5) = 4 · (20 + 35) = 4 · 55 = <strong>220</strong>.<br>
<em>A salah</em>: S₈ bukan 200. <em>C salah</em>: 240 jika b=6 (salah). <em>D salah</em>: 260 jika b=7 (salah).`
  },
  {
    no: 5,
    soal: "Di antara rumus barisan berikut, manakah yang merupakan barisan geometri?\na. Uₙ = 3n + 2\nb. Uₙ = 2·3ⁿ⁻¹\nc. Uₙ = n² + 1\nd. Uₙ = n³·2⁻ⁿ\ne. Uₙ = 5n − 4",
    options: [
      "a. Uₙ = 3n + 2",
      "b. Uₙ = 2·3ⁿ⁻¹",
      "c. Uₙ = n² + 1",
      "e. Uₙ = 5n − 4"
    ],
    answer: 1,
    explanation: `Barisan geometri memiliki rasio (r) yang konstan antar suku berurutan.<br>
<strong>b. Uₙ = 2·3ⁿ⁻¹</strong>: Ini bentuk aᵣⁿ⁻¹ dengan a=2, r=3 → rasio konstan = 3 ✓.<br>
<em>a salah</em>: 3n+2 adalah barisan aritmetika (beda konstan). <em>c salah</em>: n²+1 tidak memiliki rasio konstan. <em>d salah</em>: n³·2⁻ⁿ rasio berubah setiap suku. <em>e salah</em>: 5n−4 adalah aritmetika.`
  },
  {
    no: 6,
    soal: "Diketahui barisan geometri dengan suku pertama 16 dan suku ke-3 adalah 4.\nSuku ke-5 barisan tersebut adalah …",
    options: [
      "1/2",
      "1",
      "2",
      "4"
    ],
    answer: 1,
    explanation: `<strong>Diketahui:</strong> a = 16, U₃ = 4.<br>
U₃ = a·r² → 4 = 16·r² → r² = 1/4 → r = 1/2.<br>
U₅ = a·r⁴ = 16·(1/2)⁴ = 16·(1/16) = <strong>1</strong>.<br>
<em>A salah</em>: 1/2 = U₆. <em>C salah</em>: 2 = U₄. <em>D salah</em>: 4 = U₃ (bukan ke-5).`
  },
  {
    no: 7,
    soal: "Suatu barisan geometri memiliki suku pertama 54 dan U₄ = 2.\nBerapakah jumlah 5 suku pertama barisan tersebut?",
    options: [
      "78 2/3",
      "80 2/3",
      "82 2/3",
      "84 2/3"
    ],
    answer: 1,
    explanation: `<strong>Diketahui:</strong> a = 54, U₄ = 2.<br>
U₄ = a·r³ → 2 = 54·r³ → r³ = 1/27 → r = 1/3.<br>
Barisan: 54, 18, 6, 2, 2/3, …<br>
S₅ = 54 + 18 + 6 + 2 + 2/3 = 80 + 2/3 = <strong>80 2/3</strong> ✓.<br>
<em>A salah</em>: 78⅔. <em>C salah</em>: 82⅔. <em>D salah</em>: 84⅔.`
  },
  {
    no: 8,
    soal: "Jumlah tak hingga dari deret geometri: 12 + 8 + 16/3 + … adalah …",
    options: [
      "30",
      "36",
      "40",
      "48"
    ],
    answer: 1,
    explanation: `<strong>Diketahui:</strong> a = 12, r = 8/12 = 2/3.<br>
Karena |r| < 1, jumlah tak hingga: S∞ = a/(1−r) = 12/(1−2/3) = 12/(1/3) = <strong>36</strong>.<br>
Verifikasi: 16/3 ÷ 8 = 16/(3·8) = 2/3 ✓ (rasio konstan).<br>
<em>A salah</em>: 30 ≠ hasil. <em>C salah</em>: 40 ≠ hasil. <em>D salah</em>: 48 ≠ hasil.`
  },
  {
    no: 9,
    soal: "Sebuah bola menggelinding dan melambat membentuk barisan geometri. Detik ke-1: 12 m, detik ke-2: 9 m, detik ke-3: 6,75 m, dan seterusnya.\nJarak total yang ditempuh bola sampai berhenti adalah …",
    options: [
      "36 meter",
      "42 meter",
      "48 meter",
      "54 meter"
    ],
    answer: 2,
    explanation: `<strong>Diketahui:</strong> a = 12, r = 9/12 = 3/4.<br>
Karena |r| < 1, bola akhirnya berhenti, jarak total:<br>
S∞ = a/(1−r) = 12/(1−3/4) = 12/(1/4) = <strong>48 meter</strong>.<br>
<em>A salah</em>: 36 = hanya 3 suku pertama. <em>B salah</em>: 42 bukan nilai S∞. <em>D salah</em>: 54 terlalu besar.`
  },
  {
    no: 10,
    soal: "Andi menabung di bank sebesar Rp3.000.000 dengan suku bunga majemuk 5% per tahun.\nBerapa besar tabungan Andi setelah 4 tahun?",
    options: [
      "Rp3.486.750",
      "Rp3.600.000",
      "Rp3.646.518",
      "Rp3.750.000"
    ],
    answer: 2,
    explanation: `<strong>Rumus bunga majemuk:</strong> M = P·(1 + i)ⁿ.<br>
M = 3.000.000·(1 + 0,05)⁴ = 3.000.000·(1,05)⁴.<br>
(1,05)⁴ = 1,21550625.<br>
M = 3.000.000 × 1,21550625 ≈ <strong>Rp3.646.518</strong>.<br>
<em>A salah</em>: Rp3.486.750 adalah hasil (1,05)³ bukan ⁴. <em>B salah</em>: Rp3.600.000 hanya bunga sederhana. <em>D salah</em>: Rp3.750.000 = bunga sederhana 4×5%=20%.`
  },
  {
    no: 11,
    soal: "Sebuah motor dibeli dengan harga Rp50.000.000. Jika setiap tahun mengalami penyusutan 10% dari harga tahun sebelumnya, maka harga motor setelah 4 tahun adalah …",
    options: [
      "Rp29.160.000",
      "Rp30.000.000",
      "Rp32.805.000",
      "Rp28.350.000"
    ],
    answer: 2,
    explanation: `<strong>Penyusutan 10%/tahun</strong> → tiap tahun harga tinggal 90%.<br>
Harga = 50.000.000 × (0,9)⁴.<br>
(0,9)⁴ = 0,6561.<br>
Harga = 50.000.000 × 0,6561 = <strong>Rp32.805.000</strong>.<br>
<em>A salah</em>: Rp29.160.000 = (0,9)⁵. <em>B salah</em>: Rp30.000.000 = hanya dikurangi 40% langsung. <em>D salah</em>: Rp28.350.000 = (0,9)⁶.`
  },
  {
    no: 12,
    soal: "Besar sudut 5π/6 rad sama dengan … derajat.",
    options: [
      "120°",
      "135°",
      "150°",
      "160°"
    ],
    answer: 2,
    explanation: `<strong>Rumus konversi:</strong> Derajat = radian × (180/π).<br>
5π/6 × (180/π) = 5 × 180/6 = 5 × 30 = <strong>150°</strong>.<br>
<em>A salah</em>: 120° = 2π/3. <em>B salah</em>: 135° = 3π/4. <em>D salah</em>: 160° bukan konversi π rasional.`
  },
  {
    no: 13,
    soal: "Besar sudut 60° sama dengan … radian.",
    options: [
      "π/4",
      "π/3",
      "π/2",
      "2π/3"
    ],
    answer: 1,
    explanation: `<strong>Rumus konversi:</strong> Radian = derajat × (π/180).<br>
60° × (π/180) = π/3 rad.<br>
<em>A salah</em>: π/4 = 45°. <em>C salah</em>: π/2 = 90°. <em>D salah</em>: 2π/3 = 120°.`
  },
  {
    no: 14,
    soal: "Segitiga ABC siku-siku di C, dengan sisi BC (depan α), AC (samping α), AB (hipotenusa).\nTentukan nilai sin α.",
    options: [
      "sin α = AC/AB",
      "sin α = BC/AB",
      "sin α = BC/AC",
      "sin α = AC/BC"
    ],
    answer: 1,
    explanation: `Pada segitiga siku-siku di C, sudut α ada di titik A.<br>
• Sisi <strong>depan</strong> sudut α = BC.<br>
• Sisi <strong>miring</strong> (hipotenusa) = AB.<br>
<strong>sin α = depan/miring = BC/AB</strong>.<br>
<em>A salah</em>: AC/AB = cos α (samping/miring). <em>C salah</em>: BC/AC = tan α. <em>D salah</em>: AC/BC = cot α.`
  },
  {
    no: 15,
    soal: "Segitiga KML siku-siku di L. Panjang KM = 3 dan ML = 2, sehingga KL = √5.\nTentukan nilai sin K.",
    options: [
      "sin K = 2/3",
      "sin K = √5/3",
      "sin K = 2/√5",
      "sin K = √5/2"
    ],
    answer: 0,
    explanation: `Sudut K ada di titik K. Hipotenusa = KM = 3.<br>
Sisi depan K = ML = 2.<br>
<strong>sin K = depan/miring = ML/KM = 2/3</strong>.<br>
<em>B salah</em>: √5/3 = sin M (KL/KM). <em>C salah</em>: 2/√5 = sin dari sisi berbeda. <em>D salah</em>: √5/2 > 1, tidak mungkin.`
  },
  {
    no: 16,
    soal: "Diketahui segitiga XYZ siku-siku di Y. Jika sin X = b, maka nilai cot X adalah …",
    options: [
      "√(1−b²) / b",
      "b / √(1−b²)",
      "1/b",
      "√(1−b²)"
    ],
    answer: 0,
    explanation: `sin X = b → sisi depan = b, hipotenusa = 1.<br>
cos X = √(1−b²) (sisi samping/hipotenusa).<br>
cot X = cos X / sin X = √(1−b²) / b.<br>
<em>B salah</em>: b/√(1−b²) = tan X. <em>C salah</em>: 1/b = csc X. <em>D salah</em>: √(1−b²) = cos X.`
  },
  {
    no: 17,
    soal: "Seekor kelinci melihat elang dengan sudut elevasi 45°. Jarak antara kelinci dan elang adalah 20 meter.\nTinggi elang dari permukaan tanah adalah … meter.",
    options: [
      "10√2 meter",
      "10√3 meter",
      "10 meter",
      "20 meter"
    ],
    answer: 3,
    explanation: `<strong>Sudut elevasi</strong> = 45°. Jarak yang dimaksud = jarak mendatar (horizontal) = 20 m.<br>
tan 45° = tinggi / jarak horizontal → 1 = tinggi / 20 → tinggi = <strong>20 meter</strong>.<br>

// State
let score = { correct: 0, wrong: 0, answered: 0 };
let answered = {};

function buildQuiz() {
  const container = document.getElementById('quizContainer');
  container.innerHTML = '';

  questions.forEach((q, idx) => {
    const card = document.createElement('div');
    card.className = 'q-card';
    card.id = `card-${idx}`;

    // Soal text
    const lines = q.soal.split('\n');
    const mainQ = lines[0];
    const subQ = lines.slice(1).join('\n');

    card.innerHTML = `
      <div class="q-header">
        <div class="q-number">${q.no}</div>
        <div class="q-text">
          ${mainQ}
          ${subQ ? `<span class="math-line">${subQ.replace(/\n/g,'<br>')}</span>` : ''}
        </div>
      </div>
      <div class="q-options" id="opts-${idx}">
        ${q.options.map((opt, oi) => `
          <button class="option-btn" id="opt-${idx}-${oi}" onclick="selectAnswer(${idx}, ${oi})">
            <span class="option-label">${String.fromCharCode(65+oi)}.</span>
            <span>${opt}</span>
          </button>
        `).join('')}
      </div>
      <div class="result-badge" id="badge-${idx}"></div>
      <div class="explanation" id="expl-${idx}">
        <div class="expl-title">💡 Penjelasan</div>
        ${q.explanation}
      </div>
    `;

    container.appendChild(card);
  });

  // Summary
  const summary = document.createElement('div');
  summary.className = 'summary';
  summary.id = 'summary';
  summary.innerHTML = `
    <h2>🎉 Selesai!</h2>
    <div class="big-score" id="finalScore">0%</div>
    <p>Hasil akhir kamu</p>
    <div class="summary-stats">
      <div class="stat"><div class="val" id="sumCorrect" style="color:var(--correct)">0</div><div class="lbl">Benar</div></div>
      <div class="stat"><div class="val" id="sumWrong" style="color:var(--wrong)">0</div><div class="lbl">Salah</div></div>
      <div class="stat"><div class="val" id="sumTotal">30</div><div class="lbl">Total</div></div>
    </div>
    <button class="retry-btn" onclick="retryQuiz()">🔄 Ulangi Latihan</button>
  `;
  container.appendChild(summary);
}

function selectAnswer(qIdx, optIdx) {
  if (answered[qIdx] !== undefined) return;

  answered[qIdx] = optIdx;
  const q = questions[qIdx];
  const isCorrect = optIdx === q.answer;

  if (isCorrect) score.correct++;
  else score.wrong++;
  score.answered++;

  // Style options
  for (let i = 0; i < q.options.length; i++) {
    const btn = document.getElementById(`opt-${qIdx}-${i}`);
    btn.disabled = true;
    if (i === q.answer) {
      btn.classList.add(isCorrect && i === optIdx ? 'correct' : 'reveal-correct');
      if (isCorrect && i === optIdx) {
        btn.classList.add('correct');
        btn.innerHTML += '<span class="icon">✅</span>';
      } else {
        btn.classList.add('reveal-correct');
        btn.innerHTML += '<span class="icon">✅</span>';
      }
    } else if (i === optIdx && !isCorrect) {
      btn.classList.add('wrong');
      btn.innerHTML += '<span class="icon">❌</span>';
    }
  }

  // Badge
  const badge = document.getElementById(`badge-${qIdx}`);
  badge.className = `result-badge show ${isCorrect ? 'correct-badge' : 'wrong-badge'}`;
  badge.innerHTML = isCorrect
    ? '✅ Benar! Kerja bagus!'
    : `❌ Salah. Jawaban yang benar: <strong>${String.fromCharCode(65+q.answer)}. ${q.options[q.answer]}</strong>`;

  // Card border
  const card = document.getElementById(`card-${qIdx}`);
  card.classList.add(isCorrect ? 'answered-correct' : 'answered-wrong');

  // Explanation
  const expl = document.getElementById(`expl-${qIdx}`);
  expl.classList.add('show');

  // Update UI
  updateProgress();

  // Check if all answered
  if (score.answered === questions.length) {
    setTimeout(showSummary, 600);
  }
}

function updateProgress() {
  const pct = (score.answered / questions.length * 100).toFixed(0);
  document.getElementById('progressBar').style.width = pct + '%';
  document.getElementById('progressLabel').textContent = `${score.answered} dari ${questions.length} soal dijawab`;
  document.getElementById('scoreCorrect').textContent = score.correct;
  document.getElementById('scoreWrong').textContent = score.wrong;
  document.getElementById('scoreLeft').textContent = questions.length - score.answered;
}

function showSummary() {
  const pct = Math.round(score.correct / questions.length * 100);
  document.getElementById('finalScore').textContent = pct + '%';
  document.getElementById('sumCorrect').textContent = score.correct;
  document.getElementById('sumWrong').textContent = score.wrong;
  document.getElementById('summary').classList.add('show');
  document.getElementById('summary').scrollIntoView({ behavior: 'smooth' });
}

function retryQuiz() {
  answered = {};
  score = { correct: 0, wrong: 0, answered: 0 };
  buildQuiz();
  updateProgress();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
updateProgress();
</script>
